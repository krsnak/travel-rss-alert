name: RSS Alert

on:
  workflow_dispatch:
    inputs:
      test_telegram:
        description: Send test Telegram message only
        required: false
        default: "false"
      log_level:
        description: Logging level (DEBUG, INFO, WARNING, ERROR)
        required: false
        default: "INFO"
      seed_on_first_run:
        description: Seed all current feed items as seen when DB is empty
        required: false
        default: "false"
  schedule:
    - cron: "*/10 * * * *"

jobs:
  run-rss-alert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache seen database
        uses: actions/cache@v4
        with:
          path: seen.db
          key: rss-alert-seen-db-v1

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run RSS alert one-shot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CONFIG_PATH: config.example.yml
          DB_PATH: seen.db
          RUN_ONCE: "true"
          TEST_TELEGRAM: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.test_telegram || 'false' }}
          LOG_LEVEL: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.log_level || 'INFO' }}
          SEED_ON_FIRST_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.seed_on_first_run || 'false' }}
        run: python rss_alert.py
