name: RSS Alert

on:
  workflow_dispatch:
    inputs:
      test_telegram:
        description: Send test Telegram message only
        required: false
        default: "false"
      log_level:
        description: Logging level (DEBUG, INFO, WARNING, ERROR)
        required: false
        default: "INFO"
      seed_on_first_run:
        description: Seed all current feed items as seen when DB is empty
        required: false
        default: "false"
      dry_run:
        description: Parse feeds, log decisions, do not send Telegram or write seen.db
        required: false
        default: "false"
      ignore_seen:
        description: Ignore seen.db for diagnostics (do not write seen.db)
        required: false
        default: "false"
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write
  actions: read

concurrency:
  group: rss-alert
  cancel-in-progress: false

jobs:
  run-rss-alert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Debug run context
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          echo "sha=${{ github.sha }}"
          echo "actor=${{ github.actor }}"
          echo "utc_now=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run RSS alert one-shot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CONFIG_PATH: config.example.yml
          DB_PATH: seen.db
          RUN_ONCE: "true"
          TEST_TELEGRAM: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.test_telegram || 'false' }}
          LOG_LEVEL: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.log_level || 'INFO' }}
          SEED_ON_FIRST_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.seed_on_first_run || 'false' }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run || 'false' }}
          IGNORE_SEEN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ignore_seen || 'false' }}
        run: python rss_alert.py

      - name: Commit seen database state
        if: ${{ !cancelled() && !failure() && !(github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true') && !(github.event_name == 'workflow_dispatch' && github.event.inputs.ignore_seen == 'true') }}
        run: |
          if [ ! -f seen.db ]; then
            echo "seen.db not found, nothing to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git status --short
          git add seen.db
          if git diff --cached --quiet; then
            echo "No seen.db changes to commit"
          else
            git commit -m "chore: persist seen.db state"
            git push origin HEAD:main
          fi
